buildFuture = true
enableGitInfo = true
baseURL = "https://cxedhub.github.io/wiki/"
languageCode = "en-us"
title = "CX Ed Hub"
enableRobotsTXT = true
summaryLength = 40

[pagination]
  pagerSize = 24

[params]
  description = "Computing + X Educator Hub — Lesson plans and resources for K-12 educators integrating computing into their classrooms."
  author = "Drs. Andrea & Mike Borowczak"
  googleDriveURL = "https://drive.google.com/drive/folders/1XAVZK-JsxamRXHE7N7hKBIPvAEf67gYv?usp=sharing"
  # Paste the Google Forms embed URL here (Send → </> → copy the src URL, e.g. https://docs.google.com/forms/d/e/FORM_ID/viewform?embedded=true).
  # Leave blank to show a "not yet configured" placeholder.
  contactFormURL = ""
  # GoatCounter site code (the "xxx" in xxx.goatcounter.com). Leave empty to disable.
  # Sign up at https://www.goatcounter.com/signup, then set e.g. goatcounter = "cxedhub"
  goatcounter = "drmikeb"

[taxonomies]
  tag = "tags"
  subject = "subjects"
  grade_level = "grade_levels"
  cs_domain = "cs_domains"
  cs_principle = "cs_principles"
  standard_type = "standard_types"

[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "JSON"]

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Lesson Plans"
    url = "/lessons/"
    weight = 2
  [[menu.main]]
    name = "Professional Development"
    url = "/pds/"
    weight = 3
  [[menu.main]]
    name = "Resources"
    url = "/resources/"
    weight = 4
  [[menu.main]]
    name = "Standards Matrix"
    url = "/matrix/"
    weight = 5
  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 6