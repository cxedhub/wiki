baseURL = "https://cxedhub.github.io/wiki/"
languageCode = "en-us"
title = "CX Ed Hub"
enableRobotsTXT = true
summaryLength = 40

[pagination]
  pagerSize = 24

[params]
  description = "Computing + X Educator Hub — Lesson plans and resources for K-12 educators integrating computing into their classrooms."
  author = "Drs. Andrea & Mike Borowczak"
  contactEmail = "mike@freyjalabs.com"
  googleDriveURL = "https://drive.google.com/drive/folders/1XAVZK-JsxamRXHE7N7hKBIPvAEf67gYv?usp=sharing"

[taxonomies]
  tag = "tags"
  subject = "subjects"
  grade_level = "grade_levels"
  cs_domain = "cs_domains"
  cs_principle = "cs_principles"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "JSON"]

