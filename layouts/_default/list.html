{{ define "main" }}
<div class="container">
  <h1>{{ .Title }}</h1>
  {{ .Content }}

  {{ if eq .Section "lessons" }}
    {{ partial "lesson-filters.html" . }}
  {{ end }}

  <div class="card-grid" id="lesson-list">
    {{ range .Pages }}
      {{ partial "lesson-card.html" . }}
    {{ end }}
  </div>

  {{ template "_internal/pagination.html" . }}
</div>
{{ end }}
